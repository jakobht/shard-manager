syntax = "proto3";

package uber.cadence.sharddistributor.v1;

import "google/protobuf/timestamp.proto";
import "uber/cadence/sharddistributor/v1/executor.proto";

option go_package = "github.com/cadence-workflow/shard-manager/.gen/proto/sharddistributor/v1;sharddistributorv1";

// ShardDistributorAPI is used to query shard distributor for the current owner of a shard
service ShardDistributorAPI {

  // GetShardOwner returns the owner of a specific shard. For ephemeral namespaces, a missing
  // shard may be created and assigned; use InspectShard for a read-only lookup.
  rpc GetShardOwner(GetShardOwnerRequest) returns (GetShardOwnerResponse);

  // InspectShard returns the current owner of a shard from storage only. Unlike GetShardOwner,
  // it never creates or assigns an ephemeral shard when the shard key is absent.
  rpc InspectShard(InspectShardRequest) returns (InspectShardResponse);

  // GetNamespaceState returns a snapshot of all executors in a namespace and their assigned shards
  rpc GetNamespaceState(GetNamespaceStateRequest) returns (GetNamespaceStateResponse);

  // WatchNamespaceState streams updates about executors and their assigned shards for a namespace
  rpc WatchNamespaceState(WatchNamespaceStateRequest) returns (stream WatchNamespaceStateResponse);

  // ListNamespaces returns the static namespace configuration of the shard-manager fleet.
  // This reflects the server's loaded shardDistribution.namespaces config
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);
}

message GetShardOwnerRequest {
  string shard_key = 1;
  string namespace = 2;
}

message GetShardOwnerResponse {
  string owner = 1;
  string namespace = 2;
  map<string, string> metadata = 3;
}

message InspectShardRequest {
  string shard_key = 1;
  string namespace = 2;
}

message InspectShardResponse {
  string owner = 1;
  string namespace = 2;
  map<string, string> metadata = 3;
}

message NamespaceNotFoundError {
  string namespace = 1;
}

message ShardNotFoundError {
  string namespace = 1;
  string shard_key = 2;
}

message GetNamespaceStateRequest {
  string namespace = 1;
}

message GetNamespaceStateResponse {
  string namespace = 1;
  repeated NamespaceExecutorState executors = 2;
}

message NamespaceExecutorState {
  string executor_id = 1;
  ExecutorStatus status = 2;
  google.protobuf.Timestamp last_heartbeat = 3;
  map<string, string> metadata = 4;
  repeated AssignedShardState assigned_shards = 5;
}

message AssignedShardState {
  string shard_key = 1;
  AssignmentStatus assignment_status = 2;
  // Mod revision of the executor's assigned_state etcd key when this snapshot was read.
  int64 assigned_state_mod_revision = 3;
}

message WatchNamespaceStateRequest {
  string namespace = 1;
}

message WatchNamespaceStateResponse {
  // Executor information with assigned shards
  repeated ExecutorInfo executors = 1;
}

message ExecutorInfo {
  string executor_id = 1;
  map<string, string> metadata = 2;
  repeated Shard shards = 3;
}

message Shard {
  string shard_key = 1;
}

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated NamespaceConfig namespaces = 1;
}

// NamespaceConfig is the operator-visible static configuration for a namespace,
// loaded from the server's shardDistribution.namespaces YAML config at startup.
message NamespaceConfig {
  // Name is the namespace identifier
  string name = 1;
  // Type is "fixed" or "ephemeral".
  string type = 2;
  // Mode is the migration mode (e.g. "onboarded", "local_pass", "distributed_pass").
  string mode = 3;
  // ShardNum is the configured number of shards. Only for type="fixed".
  int64 shard_num = 4;
}
